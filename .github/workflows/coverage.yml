# Workflow name — displayed in the GitHub Actions tab
name: Coverage

# When to run this workflow
on:
  pull_request:         # run on every pull request (any branch → any branch)
  push:
    branches: [master]  # also run when code is pushed directly to master

# Cancel any in-flight run for the same workflow + branch when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  coverage:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python - <<'EOF'
          import tomllib, subprocess, sys
          with open("pyproject.toml", "rb") as f:
              dev = tomllib.load(f)["project"]["optional-dependencies"]["dev"]
          subprocess.run([sys.executable, "-m", "pip", "install"] + dev, check=True)
          EOF

      # Run branch coverage on drafts/ excluding live tests and noise files (configured in pyproject.toml)
      - name: Check branch coverage
        run: python -m pytest tests/ -m "not live" --cov drafts --cov-branch --cov-fail-under=100 --cov-report=term-missing -q
