# Workflow name — displayed in the GitHub Actions tab
name: Security

# When to run this workflow
on:
  pull_request:         # run on every pull request (any branch → any branch)
  push:
    branches: [master]  # also run when code is pushed directly to master

# Cancel any in-flight run for the same workflow + branch when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Jobs are independent units of work that run on separate virtual machines.
# Multiple jobs run in parallel by default; steps within a job run sequentially.
jobs:

  # Job name — shown in GitHub UI and used in branch protection rules
  bandit:

    # GitHub provides a fresh Ubuntu Linux virtual machine for each run
    runs-on: ubuntu-latest

    # Steps run sequentially inside the job — each step must pass for the next to start
    steps:

      # Step 1 — download the repository code onto the virtual machine
      - uses: actions/checkout@v4

      # Step 2 — install Python using the version pinned in .python-version
      #           cache: 'pip' reuses downloaded packages across runs — only re-downloads
      #           when pyproject.toml changes (new package or version bump)
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      # Step 3 — install all dev dependencies (versions from pyproject.toml — single source of truth)
      - name: Install dev dependencies
        run: |
          python - <<'EOF'
          import tomllib, subprocess, sys
          with open("pyproject.toml", "rb") as f:
              dev = tomllib.load(f)["project"]["optional-dependencies"]["dev"]
          subprocess.run([sys.executable, "-m", "pip", "install"] + dev, check=True)
          EOF

      # Step 4 — scan for security issues; non-zero exit code fails the job
      - name: Scan for security issues
        run: bandit -r drafts/test_connection.py

  pip-audit:

    runs-on: ubuntu-latest

    steps:

      # Step 1 — download the repository code onto the virtual machine
      - uses: actions/checkout@v4

      # Step 2 — install Python using the version pinned in .python-version
      #           cache: 'pip' reuses downloaded packages across runs — only re-downloads
      #           when pyproject.toml changes (new package or version bump)
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      # Step 3 — install PyPI-available project dependencies and all dev tools
      #
      #   Why not "pip install .[dev]"?
      #     pyproject.toml lists ibapi as a dependency, but ibapi is not published on PyPI —
      #     it is distributed by Interactive Brokers as a direct download. pip install . would
      #     fail trying to resolve ibapi from PyPI. ibapi is filtered out by name; all other
      #     packages use the exact version pins from pyproject.toml — single source of truth.
      - name: Install dependencies
        run: |
          python - <<'EOF'
          import tomllib, subprocess, sys
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
              deps = [d for d in data["project"]["dependencies"] if not d.startswith("ibapi")]
              dev = data["project"]["optional-dependencies"]["dev"]
          subprocess.run([sys.executable, "-m", "pip", "install"] + deps + dev, check=True)
          EOF

      # Step 4 — check every installed package against the OSV vulnerability database
      #           (https://osv.dev) for known CVEs; non-zero exit code fails the job
      - name: Audit dependencies
        run: pip-audit
